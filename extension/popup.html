<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e5e7eb;
      font-size: 13px;
    }
    .wrap { padding: 16px; }
    .head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .head img { width: 24px; height: 24px; border-radius: 6px; }
    .head b { font-size: 15px; }
    .sub { color: #94a3b8; font-size: 12px; margin: 6px 0 12px; line-height: 1.5; }
    input {
      width: 100%; box-sizing: border-box; padding: 9px 10px; margin-bottom: 8px;
      background: #1a1f26; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 13px;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
      width: 100%; padding: 9px; border: none; border-radius: 8px; cursor: pointer;
      background: #4f46e5; color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 6px;
    }
    button:hover { background: #6366f1; }
    button.secondary { background: #1f2937; color: #cbd5e1; font-weight: 500; }
    .err { color: #f87171; font-size: 12px; margin: 4px 0 8px; }
    .ok { color: #34d399; font-size: 12px; margin: 4px 0 8px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .badge.locked { background: #7c2d12; color: #fdba74; }
    .badge.unlocked { background: #14532d; color: #86efac; }
    .hidden { display: none; }
    code { background: #1a1f26; padding: 2px 5px; border-radius: 4px; font-size: 11px; word-break: break-all; }
    a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head"><img src="icons/icon-48.png" /><b>MSec</b> <span id="state-badge"></span></div>

    <div id="view-config" class="hidden">
      <div class="sub">
        One-time setup: paste an OAuth client ID into <code>config.js</code> and reload the extension.
        Register this redirect URI on the client:<br /><br />
        <code id="redirect-uri"></code>
      </div>
    </div>

    <div id="view-signin" class="hidden">
      <div class="sub">Sign in with the same Google account you use in the MSec app.</div>
      <button id="btn-signin">Sign in with Google</button>
      <div class="err" id="signin-err"></div>
    </div>

    <div id="view-unlock" class="hidden">
      <div class="sub" id="unlock-email"></div>
      <input type="password" id="master-password" placeholder="Master password" autofocus />
      <button id="btn-unlock">Unlock vault</button>
      <div class="err" id="unlock-err"></div>
      <button class="secondary" id="btn-signout-1">Sign out</button>
    </div>

    <div id="view-unlocked" class="hidden">
      <div class="sub" id="unlocked-info"></div>
      <button id="btn-lock" class="secondary">Lock now</button>
      <button id="btn-signout-2" class="secondary">Sign out</button>
      <div class="sub">Click the MSec icon in any login field to autofill or save credentials.</div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
