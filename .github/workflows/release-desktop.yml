# Builds installers for Windows (.msi/.exe), macOS Universal (.dmg/.app),
# and Linux (.deb/.rpm/.AppImage) whenever you push a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# Creates a draft GitHub Release with all binaries attached.
name: Release Desktop Apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - run: npm ci

      - name: Generate Tauri icons
        run: npx tauri icon public/icons/icon-1024.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MSec ${{ github.ref_name }}"
          releaseBody: "See the attached installers for Windows, macOS (Universal), and Linux."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
